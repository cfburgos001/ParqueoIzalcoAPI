<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Control de Ingreso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a56db;
            --primary-hover: #1444b0;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --danger: #dc2626;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--gray-900) 0%, #1e3a5f 50%, var(--gray-900) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }

        .login-header {
            background: var(--gray-900);
            padding: 32px 32px 28px;
            text-align: center;
            color: var(--white);
        }

        .login-logo {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .login-header h1 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .login-header p {
            font-size: 13px;
            color: var(--gray-400);
        }

        .login-body {
            padding: 32px;
        }

        .login-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 4px;
        }

        .login-subtitle {
            font-size: 13px;
            color: var(--gray-500);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

            .form-group label {
                display: block;
                font-size: 13px;
                font-weight: 600;
                color: var(--gray-600);
                margin-bottom: 6px;
                text-transform: uppercase;
                letter-spacing: 0.3px;
            }

            .form-group input {
                width: 100%;
                padding: 14px 16px;
                border: 2px solid var(--gray-200);
                border-radius: 8px;
                font-size: 15px;
                font-family: inherit;
                color: var(--gray-800);
                transition: border-color 0.2s, box-shadow 0.2s;
            }

                .form-group input:focus {
                    outline: none;
                    border-color: var(--primary);
                    box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.15);
                }

                .form-group input::placeholder {
                    color: var(--gray-400);
                }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

            .btn-login:hover {
                background: var(--primary-hover);
            }

            .btn-login:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }

        .error-msg {
            background: #fee2e2;
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 18px;
            display: none;
            text-align: center;
        }

            .error-msg.active {
                display: block;
            }

        .login-footer {
            text-align: center;
            padding: 0 32px 24px;
            font-size: 12px;
            color: var(--gray-400);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">👁️</div>
            <h1>DOBLE GEMINIS, S.A. DE C.V.</h1>
            <p>Centro Panamericano de Ojos</p>
        </div>

        <div class="login-body">
            <div class="login-title">Iniciar Sesión</div>
            <div class="login-subtitle">Control de Ingreso de Visitantes</div>

            <div class="error-msg" id="errorMsg"></div>

            <form id="formLogin" onsubmit="hacerLogin(event)">
                <div class="form-group">
                    <label for="username">👤 Usuario</label>
                    <input type="text" id="username" placeholder="Ingrese su usuario" autocomplete="username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">🔒 Contraseña</label>
                    <input type="password" id="password" placeholder="Ingrese su contraseña" autocomplete="current-password" required>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    Ingresar
                </button>
            </form>
        </div>

        <div class="login-footer">
            Sistema de Control de Parqueo — IOT
        </div>
    </div>

    <script>
        // Verificar si ya tiene sesión activa
        const operador = sessionStorage.getItem('operador');
        if (operador) {
            window.location.href = '/visitas/index.html';
        }

        async function hacerLogin(event) {
            event.preventDefault();

            const btnLogin = document.getElementById('btnLogin');
            const errorMsg = document.getElementById('errorMsg');

            btnLogin.disabled = true;
            btnLogin.textContent = '⏳ Verificando...';
            errorMsg.classList.remove('active');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/visitas/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (data.exitoso && data.data) {
                    // Guardar datos del operador en sessionStorage
                    sessionStorage.setItem('operador', JSON.stringify(data.data));

                    // Redirigir al portal
                    window.location.href = '/visitas/index.html';
                } else {
                    errorMsg.textContent = data.mensaje || 'Usuario o contraseña incorrectos';
                    errorMsg.classList.add('active');
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (err) {
                errorMsg.textContent = 'Error de conexión al servidor';
                errorMsg.classList.add('active');
            } finally {
                btnLogin.disabled = false;
                btnLogin.textContent = 'Ingresar';
            }
        }

        // Enter en password hace submit
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('formLogin').requestSubmit();
        });
    </script>

</body>
</html>
